<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Shop Pro</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1> Tech Shop</h1>

    <div class="header-right">
        <!-- APPLE TOGGLE -->
        <label class="switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>

        <button onclick="openCart()">🛒 <span id="cartCount">0</span></button>
    </div>
</header>

<nav>
    <button onclick="filterCategory('all')">Barchasi</button>
    <button onclick="filterCategory('laptop')">Noutbuk</button>
    <button onclick="filterCategory('monitor')">Monitor</button>
    <button onclick="filterCategory('peripheral')">Qurilmalar</button>
</nav>

<input type="text" id="searchInput" placeholder="Qidiruv..." onkeyup="searchProduct()">

<section class="products" id="productList"></section>

<!-- CART -->
<div class="cart" id="cart">
    <h2>Savatcha</h2>
    <div id="cartItems"></div>
    <h3 id="totalPrice"></h3>
    <a href="checkout.html"><button>Checkout</button></a>
    <button onclick="closeCart()">Yopish</button>
</div>

<!-- MODAL -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>

    <img id="modalImg">
    <h2 id="modalTitle"></h2>
    <p id="modalPrice"></p>
    <ul id="modalSpecs"></ul>

    <button id="modalCartBtn">Savatchaga qo‘shish</button>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
